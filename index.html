<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>花子-Hanako signal｜入稿効果の検証・データ管理</title>
<style>
:root{
 --bg:#f7f7f5;--surface:#ffffff;--text:#37352f;--text2:#6b6a66;--text3:#9b9a97;
 --border:rgba(15,15,15,.09);--border2:rgba(15,15,15,.055);--hover:#f1f1ef;
 --accent:#2a6df5;--accent2:#1b56d0;--accent-soft:#eaf1fe;
 --green:#1f7a52;--green-bg:#e7f4ee;--red:#c4453f;--red-bg:#fbecea;
 --amber:#946a00;--amber-bg:#f8f0d6;--blue:#2f6fb0;--blue-bg:#e8f0f9;
 --purple:#7a52c4;--purple-bg:#efe9fa;--gray-bg:#efefed;--gray-tx:#787774;
 --shadow:0 1px 2px rgba(15,15,15,.05),0 2px 6px rgba(15,15,15,.04);
 --r:12px;--r2:9px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
header{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border2);padding:13px 16px;position:sticky;top:0;z-index:20}
header h1{margin:0;font-size:16px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
header h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
header .sub{font-size:11px;color:var(--text3);margin-top:2px}
.tabs{display:flex;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border2);position:sticky;top:53px;z-index:19;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:none;border:0;background:none;padding:11px 13px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text3);cursor:pointer;position:relative;white-space:nowrap;transition:color .15s}
.tabs button.on{color:var(--text)}
.tabs button.on::after{content:"";position:absolute;left:11px;right:11px;bottom:-1px;height:2px;border-radius:2px;background:var(--accent)}
.tabs button:hover{color:var(--text)}
.wrap{padding:16px;max-width:880px;margin:0 auto;padding-bottom:96px}
.row{display:flex;align-items:center;gap:8px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:8px}
.muted{color:var(--text3)}
.sec-h{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.01em;margin:18px 2px 8px}
/* stat cards */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px;margin-bottom:10px}
.stat{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:12px;box-shadow:var(--shadow)}
.stat .t{font-size:10.5px;font-weight:600;color:var(--text3);letter-spacing:.02em}
.stat .n{font-size:23px;font-weight:760;margin:3px 0 0;letter-spacing:-.02em}
.stat .n small{font-size:12px;font-weight:600;color:var(--text3)}
.stat .s{font-size:10.5px;color:var(--text3);margin-top:1px}
.bar{height:5px;border-radius:3px;background:var(--gray-bg);margin-top:8px;overflow:hidden}
.bar .fill{height:100%;border-radius:3px;transition:width .45s cubic-bezier(.2,.7,.3,1)}
.stat.dm{box-shadow:var(--shadow),inset 3px 0 0 var(--accent)}
.stat.op{box-shadow:var(--shadow),inset 3px 0 0 var(--purple)}
.stat.is{box-shadow:var(--shadow),inset 3px 0 0 var(--green)}
.stat.hh{box-shadow:var(--shadow),inset 3px 0 0 var(--amber)}
.hero{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:15px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.hero .t{font-size:11.5px;font-weight:600;color:var(--text3)}
.hero .n{font-size:30px;font-weight:780;letter-spacing:-.025em;margin:2px 0 0}
.hero .n small{font-size:14px;color:var(--text3);font-weight:600}
.hero .s{font-size:11px;color:var(--text3);margin-top:2px}
/* cards */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:13px;margin-bottom:10px;box-shadow:var(--shadow)}
.card .hd{display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer}
.card .nm{font-size:14px;font-weight:650;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.det{display:none;margin-top:11px;border-top:1px solid var(--border2);padding-top:11px}.det.show{display:block}
.info{font-size:12px;color:var(--text2);margin-top:7px}
/* pills */
.pill{font-size:10.5px;font-weight:650;padding:2.5px 9px;border-radius:7px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.p-dm{background:var(--accent-soft);color:var(--accent2)}.p-op{background:var(--purple-bg);color:var(--purple)}.p-is{background:var(--green-bg);color:var(--green)}.p-hh{background:var(--amber-bg);color:var(--amber)}.p-uc{background:var(--bg2);color:var(--text2)}
.p-pre{background:var(--amber-bg);color:var(--amber)}.p-act{background:var(--green-bg);color:var(--green)}.p-done{background:var(--gray-bg);color:var(--gray-tx)}
.p-st{background:var(--blue-bg);color:var(--blue)}
/* forms */
label{display:block;font-size:10.5px;font-weight:600;color:var(--text3);margin:9px 0 3px}
input,select,textarea{width:100%;font-family:inherit;font-size:13.5px;padding:9px 10px;border:1px solid var(--border);border-radius:var(--r2);background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
textarea{resize:vertical;min-height:54px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-weight:650;cursor:pointer;border-radius:var(--r2);transition:background .15s,transform .05s,box-shadow .15s;border:1px solid transparent}
.btn:active{transform:translateY(1px)}
.btn-pri{background:var(--accent);color:#fff;padding:11px 14px;font-size:14px;width:100%;box-shadow:0 1px 2px rgba(42,109,245,.35)}
.btn-pri:hover{background:var(--accent2)}
.btn-sec{background:var(--surface);color:var(--text);border-color:var(--border);padding:10px 13px;font-size:13px;width:100%}
.btn-sec:hover{background:var(--hover)}
.btn-sm{background:var(--hover);color:var(--text2);border:0;border-radius:7px;padding:5px 11px;font-weight:650;font-size:12px;cursor:pointer}
.btn-sm:hover{background:var(--gray-bg)}
.btn-danger{color:var(--red)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0}
.chip{border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:6px 11px;font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .12s}
.chip:hover{background:var(--hover)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.card.needfix{box-shadow:var(--shadow),inset 3px 0 0 var(--amber)}
.warnbox{background:var(--amber-bg);color:var(--amber);border-radius:8px;padding:8px 10px;font-size:11.5px;font-weight:600;margin-top:8px;line-height:1.5}
.qlabel{font-size:10.5px;font-weight:700;color:var(--text2);margin:11px 0 5px;letter-spacing:.01em}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal{background:#fff;border-radius:14px;padding:18px 16px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.mmsg{font-size:13.5px;line-height:1.6;margin-bottom:14px;color:var(--text)}
.mbtns{display:flex;gap:8px}
.mbtns .btn{flex:1}
.modal.big{max-width:560px;max-height:86vh;display:flex;flex-direction:column;padding:0}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;border-radius:14px 14px 0 0}
.mhd b{font-size:14px}
.mhd .x{border:none;background:var(--bg2);width:28px;height:28px;border-radius:8px;font-size:16px;cursor:pointer;color:var(--text2)}
.mbody{padding:14px 16px;overflow:auto}
.lk{cursor:pointer;color:var(--accent);text-decoration:underline;text-decoration-color:var(--border);text-underline-offset:2px}
.filt{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filt button{border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:6px 11px;font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .12s}
.filt button.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.drop{border:2px dashed var(--border);border-radius:var(--r);background:var(--surface);padding:26px 16px;text-align:center;cursor:pointer;margin-bottom:11px;transition:all .15s}
.drop.over{border-color:var(--accent);background:var(--accent-soft)}
.drop .di{font-size:14px;font-weight:650;color:var(--text)}
.drop .ds{font-size:11.5px;margin-top:5px;color:var(--text3)}
.infocard{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 12px;margin-top:9px}
.infocard .ig{margin-bottom:9px}.infocard .ig:last-child{margin-bottom:0}
.infocard .ih{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.infocard .fl{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px}
.infocard .fi{font-size:12px;line-height:1.75}.infocard .fi b{color:var(--text3);font-weight:600;margin-right:5px;font-size:11px}
.pdfbtn{display:inline-flex;align-items:center;gap:5px;background:var(--hover);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:650;cursor:pointer;margin-top:9px}
.pdfbtn:hover{background:var(--gray-bg)}
.sc{font-size:17px;font-weight:740;color:var(--text)}
.ck{display:flex;align-items:center;gap:7px;margin:6px 0}.ck input{width:auto}.ck label{margin:0;font-size:12.5px;font-weight:500;color:var(--text)}
.empty{text-align:center;color:var(--text3);padding:36px 14px;font-size:13px}
.tblwrap{overflow-x:auto;border:1px solid var(--border2);border-radius:var(--r2);background:var(--surface)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--bg);color:var(--text3);padding:8px 8px;text-align:left;font-weight:650;font-size:10.5px;letter-spacing:.02em;border-bottom:1px solid var(--border2);white-space:nowrap}
.tbl td{padding:8px 8px;border-bottom:1px solid var(--border2);white-space:nowrap}
.tbl tr:last-child td{border-bottom:0}
.tbl tr:hover td{background:var(--hover)}
.tline{border-left:2px solid var(--border);margin-left:5px;padding-left:12px}
.tline .te{position:relative;margin-bottom:9px}
.tline .te::before{content:"";position:absolute;left:-17px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--surface)}
.tline .te .tt{font-size:12px;font-weight:600}
.tline .te .tm{font-size:12px;color:var(--text2);margin-top:1px}
.tline .te .td{font-size:10.5px;color:var(--text3);margin-top:1px}
.hbar{display:flex;align-items:center;gap:8px;margin:3px 0}
.hbar .hl{width:74px;font-size:11px;color:var(--text2);flex:none}
.hbar .ht{flex:1;height:18px;background:var(--bg);border-radius:5px;overflow:hidden;position:relative}
.hbar .hf{height:100%;border-radius:5px}
.hbar .hv{width:80px;font-size:11px;font-weight:650;text-align:right;flex:none}
.divider{border:0;border-top:1px solid var(--border2);margin:12px 0}
.note{font-size:11px;color:var(--text3);line-height:1.6}
.bk{display:flex;gap:8px;margin-top:14px}
.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:50;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.fade{animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style></head><body>
<header><h1><span class="dot"></span>花子-Hanako signal <span style="font-size:11px;color:var(--text3);font-weight:600">β</span></h1><div class="sub">運を、構造化する。</div></header>
<div class="tabs">
<button id="tb-dash" class="on" onclick="tab('dash')">ダッシュボード</button>

<button id="tb-list" onclick="tab('list')">物件一覧</button>

</div>
<div class="wrap">
<div id="v-dash"></div>
<div id="v-add" style="display:none">
 <div id="drop" class="drop"><div class="di">📄 マイソクPDFをドロップ</div><div class="ds">複数可 ／ タップして選択 → 自動読み取り</div></div>
 <input type="file" id="pdf" accept="application/pdf" multiple style="display:none">
 <div id="pend"></div>
 <div id="addbar" style="display:none"><button class="btn btn-pri" onclick="savePend()">完了：登録する（要入稿へ）<span id="pcnt"></span></button></div>
 <button class="btn btn-sec" style="margin-top:9px" onclick="addBlank()">＋ 手動で1件追加</button>
 <div class="bk"><button class="btn btn-sec" onclick="setAPI()">共有設定</button><button class="btn btn-sec" onclick="refreshData()">再読込</button><button class="btn btn-sec" onclick="loadSample()">サンプル投入</button><button class="btn btn-sec" onclick="clearAll()">全消去</button><button class="btn btn-sec" onclick="exportJ()">バックアップ書出</button><button class="btn btn-sec" onclick="document.getElementById('imp').click()">読込(JSON)</button><input type="file" id="imp" accept=".json" style="display:none" onchange="importJ(event)"></div>
</div>

<div id="v-opt" style="display:none"><div id="obody"></div></div>
<div id="v-sub" style="display:none"><div id="subbody"></div></div>
<div id="v-drop" style="display:none"><div id="dropbody"></div></div>
<div id="v-csv" style="display:none">
 <div class="drop" id="csvdrop"><div class="di">📊 CSV / Excelをドロップ</div><div class="ds">ビジコン＝PV（アプリ・スマホ込）／ 反響報告書(Excel)＝反響・オプション ／ JDS＝反響</div></div>
 <input type="file" id="csvin" accept=".csv" style="display:none">
 <div id="csvpending"></div>
 <div id="csvlog"></div>
</div>

<div id="v-ana" style="display:none"><div id="anabody"></div></div>

</div>

function relTime(ts){if(!ts)return'';const t=new Date(ts.replace('T',' ').replace(/-/g,'/')),n=new Date();const m=Math.round((n-t)/60000);if(m<1)return'たった今';if(m<60)return m+'分前';const h=Math.floor(m/60);if(h<24)return h+'時間前';const d=Math.floor(h/24);if(d<30)return d+'日前';return Math.floor(d/30)+'ヶ月前';}
function normName(s){return(s||'').replace(/[\s\u3000]+/g,'').trim();}
function madoriCat(m){if(!m)return'';return/^(1R|1K|1DK|ワンルーム)$/.test(m)?'シングル':(/^(1LDK|2K|2DK)$/.test(m)?'カップル':'ファミリー');}
function rentToBand(r){r=parseFloat(r);if(isNaN(r))return -1;if(r<3)return 0;if(r>=30)return 20;if(r>=25)return 19;if(r>=20)return 18;return Math.floor(r)-2;}
function autoWaku(station,madori,rent){var cat=madoriCat(madori),band=rentToBand(rent);var z=ZONES[station+'|'+cat];if(!z||band<0){return parseFloat(rent)>=20?'High-Hold':'Insight';}if(z.o&&z.o.indexOf(band)>=0)return'Opportunity';if(z.d&&z.d.indexOf(band)>=0)return'Demand';return parseFloat(rent)>=20?'High-Hold':'Insight';}
function autoWakuImport(station,madori,rent){var cat=madoriCat(madori),band=rentToBand(rent);var z=ZONES[station+'|'+cat];if(z&&band>=0){if(z.o&&z.o.indexOf(band)>=0)return'Opportunity';if(z.d&&z.d.indexOf(band)>=0)return'Demand';}return'未分類';}
function calcAge(y,mo){const n=new Date();return Math.floor((n.getFullYear()*12+n.getMonth()+1-y*12-mo)/12);}
function finalScore(p){return(+p.scorePre||0)+(p.storePick?4:0)+(p.specArea?2:0)+(p.video?2:0);}
function kijun(s){return s>=43?'第3':s>=38?'第2':s>=34?'第1':'基準未満';}
function curStatus(p){return p.statusLog&&p.statusLog.length?p.statusLog[p.statusLog.length-1]:null;}

async function gget(k,def){
 if(k.indexOf('pdf_')===0){try{const r=localStorage.getItem(k);return r?JSON.parse(r):def;}catch(e){return def;}}
 try{if(window.storage){const r=await window.storage.get(k);return r&&r.value?JSON.parse(r.value):def;}}catch(e){}
 try{const r=localStorage.getItem(k);return r?JSON.parse(r):def;}catch(e){}return def;}
async function gset(k,v){

 if(API){schedulePush();return;}
 try{if(window.storage){await window.storage.set(k,JSON.stringify(v));return;}}catch(e){}
 try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function recompute(){
 const m=viewYM;
 const pvm={},inqBm={};
 Object.keys(HIST).forEach(d=>{if(ym(d)!==m)return;const o=HIST[d];Object.keys(o).forEach(pid=>{pvm[pid]=(pvm[pid]||0)+(+o[pid].pv||0);inqBm[pid]=(inqBm[pid]||0)+(+o[pid].inqB||0);});});
 const jds={};
 Object.keys(EVENTS).forEach(k=>{const e=EVENTS[k];if(!e.propId)return;if(ym(e.date)!==m)return;jds[e.propId]=(jds[e.propId]||0)+1;});
 PROPS.forEach(p=>{p.csvPV=pvm[p.id]||0;p.csvInqB=inqBm[p.id]||0;p.csvInq=jds[p.id]||0;});
}

async function pdfText(file){const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;let t='';for(let p=1;p<=Math.min(pdf.numPages,2);p++){const pg=await pdf.getPage(p);const c=await pg.getTextContent();t+=c.items.map(i=>i.str).join(' ');}return t;}
function parseMoney(s){if(!s)return NaN;s=s.replace(/[,，\s]/g,'');if(/万/.test(s)){const p=s.split('万');const a=parseInt(p[0])||0;const b=p[1]?parseInt(p[1])||0:0;return a*10000+b;}return parseInt(s)||NaN;}

function getRent(txt){
 // 1) labelled 賃料 / 月額賃料  → value within a few chars
 let m=txt.match(/(?:月額)?賃料(?:等)?[:：]?\\?([0-9]{1,2}万[0-9]{1,4}|[0-9]{1,2}万|[0-9]{2,3}[,，][0-9]{3})円?/);
 if(m){const v=parseMoney(m[1]);if(v>=30000&&v<=900000)return v;}
 // 2) man-format anywhere (e.g. 8万5,000円)
 m=txt.match(/([0-9]{1,2}万[0-9,，]{0,5})円/g);
 if(m){for(const x of m){const v=parseMoney(x.replace('円',''));if(v>=40000&&v<=900000)return v;}}
 // 3) fallback: first plausible yen value not preceded by fee/deposit words
 const re=/([0-9]{2,3}[,，][0-9]{3})円/g;let mm;
 while((mm=re.exec(txt))){const v=parseMoney(mm[1]);if(v<40000||v>600000)continue;const pre=txt.slice(Math.max(0,mm.index-5),mm.index);if(/(管理費|共益費|保証|敷金|礼金|保険|費用|手数料|委託|償却|積増|町会|更新|違約|清掃|サポート)/.test(pre))continue;return v;}
 return NaN;
}

function parseBuilt(txt){
 // western with label
 let m=txt.match(/(?:築年月|築年数|建築年月|竣工|完成|新築)[^\d令平昭]{0,3}(\d{4})年(?:(\d{1,2})月)?/);
 if(m)return{y:+m[1],mo:m[2]?+m[2]:1};
 // era with label
 m=txt.match(/(?:築年月|築年数|建築年月|竣工|完成|新築)[^\d]{0,3}(令和|平成|昭和)(\d{1,2})年(?:(\d{1,2})月)?/);
 if(!m)m=txt.match(/(令和|平成|昭和)(\d{1,2})年(?:(\d{1,2})月)?/);
 if(m){const base={'令和':2018,'平成':1988,'昭和':1925}[m[1]];return{y:base+(+m[2]),mo:m[3]?+m[3]:1};}
 // bare western near 築/竣工
 m=txt.match(/(?:築|竣工|完成)[^\d]{0,3}(\d{4})年/);
 if(m)return{y:+m[1],mo:1};
 return null;
}

function findStations(txt){
 const re=/徒歩約?(\d{1,3})分/g;let m;const occ={};
 while((m=re.exec(txt))){
  const w=+m[1];if(w<=0||w>60)continue;
  let q=m.index;let stripped=false;
  for(let guard=0;guard<5;guard++){const c=txt[q-1];if(c==='駅'){q--;stripped=true;}else if('」』】〕）)、，。･・'.indexOf(c)>=0){q--;}else break;}
  let s=q;while(s>0&&q-s<8){const c=txt[s-1];if(c==='線')break;if(/[0-9\s、，。\/･・「『【〔（()]/.test(c))break;if(/[一-龥ぁ-んァ-ヴ々ヶケ]/.test(c)){s--;}else break;}
  let raw=txt.slice(s,q);
  // ranking (zone) station that is a suffix of raw
  let rank='';for(let st in RANK){if(st.length>rank.length&&(raw===st||raw.endsWith(st)||txt.slice(q-st.length,q)===st))rank=st;}
  if(!stripped&&!rank)continue; // reject non-station tokens (e.g. 無し)
  let name=(raw&&raw.length>=2&&raw.length<=7)?raw:(rank||raw);
  if(!name)continue;
  (occ[name]=occ[name]||[]).push({m:w,line:lineBefore(txt,s),rank:rank});
 }
 return Object.keys(occ).map(k=>{
  const list=occ[k];const wl=list.filter(x=>x.line);
  const pick=(wl.length?wl:list).sort((a,b)=>a.m-b.m)[0];
  return{st:k,m:pick.m,line:pick.line,rank:pick.rank};
 }).sort((a,b)=>a.m-b.m);
}
function trimLine(s){if(!s)return'';const ops=['東京メトロ','東京都交通局','東急','都営','JR','京王','小田急','西武','京急','相鉄','東武','京成','メトロ','ゆりかもめ','りんかい','つくば','多摩'];let best=-1;for(const o of ops){const i=s.indexOf(o);if(i>=0&&(best<0||i<best))best=i;}if(best>0)s=s.slice(best);return s;}
function lineBefore(txt,q){
 let p=q;for(let g=0;g<3;g++){const c=txt[p-1];if(c==='「'||c==='『'||c==='【'||c==='〔'||c==='（'||c==='('){p--;}else break;}
 let e=txt.lastIndexOf('線',p-1);if(e<0||p-e>3)return'';
 let s=e;while(s>0&&e-s<14){const c=txt[s-1];if(/[0-9分、，。\/]/.test(c))break;if(/[一-龥ァ-ヴーA-Za-z・]/.test(c)){s--;}else break;}
 return trimLine(txt.slice(s,e+1));
}

function findStructure(txt){
 const m=txt.match(/(鉄骨鉄筋コンクリート造?|鉄筋コンクリート造?|軽量鉄骨造?|鉄骨造|木造|SRC|RC)/);
 return m?m[1]:'';
}

var BANCHI='(?:[0-9]{1,3}丁目)?[0-9]{0,2}(?:[-−ー][0-9]{1,2}){0,4}(?:番地?[0-9]{0,3})?(?:号)?';
var ADRCORE='((?:東京都|神奈川県|千葉県|埼玉県)?[一-龥]{1,4}区[一-龥ケヶ]{1,8}'+BANCHI+')';
function cleanAddr(a){return a?a.replace(/[-−ー（(]+$/,''):'';}
function findAddress(txt){
 let m=txt.match(new RegExp('(?:物件所在地|所在地|住居表示|所在)[^0-9一-龥]{0,3}'+ADRCORE));
 if(m)return cleanAddr(m[1]);
 m=txt.match(new RegExp(ADRCORE));
 return m?cleanAddr(m[1]):'';
}

function cleanFname(fname){if(!fname)return'';return fname.normalize('NFKC').replace(/\.pdf$/i,'').replace(/[_＿]+/g,' ').replace(/\((\d+)\)\s*$/,'').replace(/\s+\d{1,2}\s*$/,'').replace(/\s+/g,' ').trim();}
function findName(txt,fname){
 const NG=['所在階','間取','間取り','構造','所在','交通','賃料','建物','設備','備考','その他','使用部分面積','物件種目','種別','専有面積','賃貸条件','管理費','物件名称','物件名','建物名'];
 let m=txt.match(/(?:建物名称|物件名称|建物名|物件名)[:：\/]?([^\s].{1,30}?)(?=構造|号室|号|所在|交通|賃料|間取|最寄|築|専有|使用部分|RC|SRC|鉄|木造|軽量|ワンルーム|TEL|物件番号|物件種|種別|【|間\s*取)/);
 if(m){let n=m[1].replace(/[（(].*?[)）]/g,'').replace(/^[^一-龥ぁ-んァ-ヴA-Za-z0-9]+/,'').replace(/[^一-龥ぁ-んァ-ヴA-Za-z0-9号室階]+$/,'').trim();
  if(n.length>=2&&n.length<=28&&/[一-龥ぁ-んァ-ヴA-Za-z]/.test(n)&&NG.indexOf(n)<0)return n;}
 return cleanFname(fname);
}
function extractFields(raw,fname){
 var txt=raw.normalize('NFKC').replace(/\u2ec4/g,'\u897f').replace(/[\s\u3000]+/g,'');
 var f={},m;
 f._readable=/(賃料|間取|徒歩|専有面積|所在地|築年)/.test(txt);
 if(!f._readable){f.name=cleanFname(fname);return f;}
 var arr=findStations(txt);
 var rankHits=arr.filter(function(x){return x.rank;}); // sorted by walk asc
 var main=rankHits[0],manualStn=false;
 if(!main){var b='';for(var st in RANK){if(st.length>b.length&&txt.indexOf(st)>=0)b=st;}if(b){main={st:b,m:null,line:'',rank:b};manualStn=true;}else{main=arr[0];manualStn=true;}}
 var zoneStn='';
 if(main){f.station=main.rank||main.st;zoneStn=main.rank||'';if(main.m!=null)f.walkMin=main.m+'分';f.line=trimLine(main.line);}
 f.nearby=arr.filter(function(x){return main&&x.st!==main.st&&x.st!==(main.rank||'');}).map(function(x){return x.st+' 徒歩'+x.m+'分'+(x.line?'（'+trimLine(x.line)+'）':'');}).join(' / ');
 m=txt.match(/(1LDK|2LDK|3LDK|4LDK|1DK|2DK|3DK|4DK|1K|2K|3K|4K|1R|ワンルーム)/);if(m)f.madori=m[1];
 var yen=getRent(txt);if(!isNaN(yen))f.rent=(yen/10000).toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
 m=txt.match(/(?:専有面積|使用部分面積|壁芯|面積)(?:約)?([\d.]+)(?:㎡|m2|m²|平米|平方)/);if(!m)m=txt.match(/([\d]{2}\.[\d]{1,2})(?:㎡|m2|m²|平米)/);if(m)f.area=m[1]+'㎡';
 var bt=parseBuilt(txt);if(bt){f.builtYM=bt.y+'年'+(bt.mo?bt.mo+'月':'');f.age=Math.max(0,calcAge(bt.y,bt.mo))+'年';}
 var sc=findStructure(txt);if(sc)f.structure=sc;
 var ad=findAddress(txt);if(ad)f.address=ad;
 f.name=findName(txt,fname);
 m=txt.match(/管理費(?:等)?[:：]?([\d,]+)円/);if(m)f.mgmtFee=m[1]+'円';
 m=txt.match(/敷金[:：]?(なし|無|[\d.]+[ヶケか]?月分?|[\d.]+万円|賃料の[\d.]+[ヶケか]月分?|[\d,]+円)/);if(m)f.deposit=m[1];
 m=txt.match(/礼金[:：]?(なし|無|[\d.]+[ヶケか]?月分?|[\d.]+万円|賃料の[\d.]+[ヶケか]月分?|[\d,]+円)/);if(m)f.keyMoney=m[1];
 m=txt.match(/TEL[:：]?([\d\-()]{8,16})/);if(m)f.phone=m[1].replace(/[()]/g,'-');
 var cos=txt.match(/(?:株式会社|有限会社)[一-龥ぁ-んァ-ヴA-Za-z・]{2,16}/g);if(cos)f.mgmtCo=cos[cos.length-1];
 m=txt.match(/(\d+)階部分/);if(m)f.floor=m[1]+'階';else{m=txt.match(/所在階[:：]?(\d+)階/);if(m)f.floor=m[1]+'階';}
 m=txt.match(/物件番号[:：]?(\d{4,})/);if(m)f.propNo=m[1];
 m=txt.match(/情報公開日[:：]?([\d.\/]+)/);if(m)f.pubDate=m[1];
 if(/B[・.]?T別|バス・?トイレ別|浴室トイレ別|BT別/.test(txt))f.btSep='あり';
 if(/洗面所独立|独立洗面/.test(txt))f.washStand='あり';
 if(zoneStn&&f.madori)f.waku=autoWaku(zoneStn,f.madori,f.rent||'0');
 var reasons=[];
 if(manualStn||!zoneStn)reasons.push('駅');
 if(!main||main.m==null)reasons.push('徒歩分');
 if(!f.rent)reasons.push('賃料');
 if(!f.madori)reasons.push('間取り');
 f._manual=reasons.length>0;f._manualReason=reasons.join('・');
 return f;
}

 h+='</div>';

function handleFiles(files){[...files].forEach(f=>{if(!/pdf/i.test(f.type)&&!/\.pdf$/i.test(f.name))return;
 const rec=mkRec();rec.pdfName=f.name;rec.auto='読取中…';PEND.push(rec);renderPend();extractInto(f,rec);});if(PEND.length)tab('add');}
async function extractInto(file,rec){
 try{const raw=await pdfText(file);const f=extractFields(raw,file.name);
  const okread=f._readable,manual=f._manual,mr=f._manualReason||'';
  delete f._readable;delete f._manual;delete f._manualReason;
  Object.keys(f).forEach(k=>{if(f[k]!=null&&f[k]!=='')rec[k]=String(f[k]);});
  if(!rec.name)rec.name=file.name.replace(/\.pdf$/i,'');
  rec.auto=!okread?'読取不可（手入力）':(manual?('要手動対応'+(mr?'：'+mr:'')):'自動読取');
  if(rec.station&&rec.madori)rec.waku=autoWaku(rec.station,rec.madori,rec.rent||'0');
  rec.rawText=raw.normalize('NFKC').replace(/\u2ec4/g,'\u897f').slice(0,2000);
  try{const ab2=await file.arrayBuffer();if(file.size<3000000){const u8=new Uint8Array(ab2);let bs='';for(let j=0;j<u8.length;j++)bs+=String.fromCharCode(u8[j]);rec.pdfData=btoa(bs);}}catch(ee){}
 }catch(e){rec.auto='読取不可（手入力）';}
 renderPend();}

async function pickPdf(id){var inp=document.createElement('input');inp.type='file';inp.accept='application/pdf,.pdf';inp.onchange=function(){if(inp.files&&inp.files[0])attachPdf(id,inp.files[0]);};inp.click();}
async function attachPdf(id,f){if(!/pdf/i.test(f.type)&&!/\.pdf$/i.test(f.name)){toast('PDFファイルを選んでください');return;}try{var ab=await f.arrayBuffer();var u8=new Uint8Array(ab);var bs='';for(var j=0;j<u8.length;j++)bs+=String.fromCharCode(u8[j]);await gset('pdf_'+id,btoa(bs));toast('PDFを保存しました（この端末に保存）');}catch(e){toast('PDFの保存に失敗しました');}}
async function viewPdf(id){try{var d=await gget('pdf_'+id,null);if(d&&typeof d==='string'&&d.length>100){window.open('data:application/pdf;base64,'+d);return;}}catch(e){}toast('PDFが保存されていません');}

let listFilt='全て',wakuFilt='全枠',listSort='スコア',rentMin='',rentMax='',listGroupUp=false,upFrom='',upTo='',lsFrom='',lsTo='';
function setListSort(v){listSort=v;renderList();}
function setRent(which,v){if(which==='min')rentMin=v;else rentMax=v;renderList();}
function setDateF(kind,v){if(kind==='upFrom')upFrom=v;else if(kind==='upTo')upTo=v;else if(kind==='lsFrom')lsFrom=v;else lsTo=v;renderList();}
function clearDateF(){upFrom='';upTo='';lsFrom='';lsTo='';renderList();}
function toggleGroupUp(){listGroupUp=!listGroupUp;renderList();}
function listCard(p,_a){
 const wc=WK_PILL[WK_MAP[p.waku]||'is'];
 const sc=p.status==='要入稿'?'p-pre':p.status==='掲載中'?'p-act':'p-done';
 const fs=p.scorePre?'最終'+finalScore(p)+'('+kijun(finalScore(p))+')':'';
 const ss=pstat(p,_a);const ds=daysSince(p.listDate);
 let metrics='';
 if(p.status==='掲載中'){const psc=propScore(ss);metrics='<div class="info" style="margin-top:4px;color:var(--text2)">'+[(ds!=null?'掲載'+ds+'日':'掲載日未記録'),(ss.hasData?'PV '+ss.avg.toFixed(1)+'/日':'PV データなし'),(ss.hasData?'反響 '+(ss.inq/ss.d).toFixed(2)+'/日':'反響 0/日')].join(' ・ ')+' </div><div style="margin-top:4px">物件スコア '+tierPill(psc)+'</div>';}
 return '<div class="card"><div class="hd" onclick="this.parentNode.querySelector(\'.det\').classList.toggle(\'show\')"><span class="pill '+wc+'">'+p.waku.slice(0,3)+'</span>'+nmLink(p)+'<span class="pill '+sc+'">'+p.status+'</span></div>'
  +'<div class="info">'+[p.station,p.madori,p.rent?p.rent+'万':'',fs].filter(Boolean).join(' ・ ')+'</div>'
  +metrics
  +'<div style="margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span class="muted" style="font-size:11px">状況メモ:</span>'+memoChip(p)+'<span class="muted" style="font-size:10.5px">登録 '+(p.uploadDate||'—')+'</span></div>'
  +'<div class="det">'+infoCard(p,_a)+'<button class="pdfbtn" onclick="viewPdf(\''+p.id+'\')">📄 PDFを見る</button><button class="pdfbtn" onclick="pickPdf(\''+p.id+'\')">📎 PDFを追加/差し替え</button>'+statusBlock(p)
  +'<div class="row" style="gap:6px;margin-top:10px">'
  +(p.status==='掲載中'?'<button class="btn-sm" onclick="chgStatus(\''+p.id+'\',\'落とし済み\')">落とし済み</button>':'')
  +(p.status==='落とし済み'?'<button class="btn-sm" onclick="chgStatus(\''+p.id+'\',\'掲載中\')">掲載中に戻す</button>':'')
  +(p.status==='要入稿'?'<button class="btn-sm" onclick="chgStatus(\''+p.id+'\',\'掲載中\')">掲載中にする</button>':'')
  +'<button class="btn-sm btn-danger" onclick="delProp(\''+p.id+'\')">削除</button></div></div></div>';
}
function renderList(){
 recompute();const _a=anaAgg();
 document.getElementById('lfilt').innerHTML=['全て','要入稿','掲載中','落とし済み'].map(s=>'<button class="'+(listFilt===s?'on':'')+'" onclick="listFilt=\''+s+'\';renderList()">'+s+'</button>').join('');
 document.getElementById('wfilt').innerHTML=['全枠','Demand','Opportunity','Insight','High-Hold','未分類'].map(s=>'<button class="'+(wakuFilt===s?'on':'')+'" onclick="wakuFilt=\''+s+'\';renderList()">'+s+'</button>').join('');
 let ps=PROPS;
 if(listFilt!=='全て')ps=ps.filter(p=>p.status===listFilt);
 if(wakuFilt!=='全枠')ps=ps.filter(p=>p.waku===wakuFilt);
 if(upFrom)ps=ps.filter(p=>(p.uploadDate||'')>=upFrom);
 if(upTo)ps=ps.filter(p=>(p.uploadDate||'')<=upTo);
 if(lsFrom)ps=ps.filter(p=>(p.suumoListStart||'')>=lsFrom);
 if(lsTo)ps=ps.filter(p=>(p.suumoListStart||'')<=lsTo);
 const rmin=parseFloat(rentMin),rmax=parseFloat(rentMax);
 if(!isNaN(rmin))ps=ps.filter(p=>{const r=parseFloat(p.rent);return !isNaN(r)&&r>=rmin;});
 if(!isNaN(rmax))ps=ps.filter(p=>{const r=parseFloat(p.rent);return !isNaN(r)&&r<=rmax;});
 const SORTS=['スコア','反響数','PV/日','反響/日','掲載日数','賃料高い','賃料安い','新着'];
 document.getElementById('lsort').innerHTML='<div class="fg" style="margin-bottom:8px"><div><label>賃料(万) 下限〜上限</label><div class="row" style="gap:6px"><input type="number" inputmode="decimal" placeholder="下限" value="'+rentMin+'" onchange="setRent(\'min\',this.value)" style="padding:8px"><span style="align-self:center">〜</span><input type="number" inputmode="decimal" placeholder="上限" value="'+rentMax+'" onchange="setRent(\'max\',this.value)" style="padding:8px"></div></div><div><label>並び替え</label><select onchange="setListSort(this.value)">'+SORTS.map(o=>'<option'+(listSort===o?' selected':'')+'>'+o+'</option>').join('')+'</select></div></div>'
  +'<div class="fg" style="margin-bottom:8px"><div><label>アップロード日（範囲）</label><div class="row" style="gap:6px"><input type="date" value="'+upFrom+'" onchange="setDateF(\'upFrom\',this.value)" style="padding:8px"><span style="align-self:center">〜</span><input type="date" value="'+upTo+'" onchange="setDateF(\'upTo\',this.value)" style="padding:8px"></div></div><div><label>SUUMO掲載開始日（範囲）</label><div class="row" style="gap:6px"><input type="date" value="'+lsFrom+'" onchange="setDateF(\'lsFrom\',this.value)" style="padding:8px"><span style="align-self:center">〜</span><input type="date" value="'+lsTo+'" onchange="setDateF(\'lsTo\',this.value)" style="padding:8px"></div></div></div>'
  +'<div class="fg" style="margin-bottom:8px"><div style="display:flex;align-items:flex-end"><button class="btn btn-sec" style="width:100%" onclick="clearDateF()">日付をクリア</button></div><div style="display:flex;align-items:flex-end"><button class="btn '+(listGroupUp?'btn-pri':'btn-sec')+'" style="width:100%" onclick="toggleGroupUp()">'+(listGroupUp?'✓ アップロード日ごと':'アップロード日ごと表示')+'</button></div></div>';
 const sv=p=>pstat(p,_a);
 ps=ps.slice().sort((a,b)=>{
  const A=sv(a),B=sv(b);
  if(listSort==='スコア')return (propScore(B)||-1)-(propScore(A)||-1);
  if(listSort==='反響数')return B.inq-A.inq;
  if(listSort==='PV/日')return B.avg-A.avg;
  if(listSort==='反響/日')return (B.d?B.inq/B.d:0)-(A.d?A.inq/A.d:0);
  if(listSort==='掲載日数')return (daysSince(b.listDate)||-1)-(daysSince(a.listDate)||-1);
  if(listSort==='賃料高い')return (parseFloat(b.rent)||0)-(parseFloat(a.rent)||0);
  if(listSort==='賃料安い')return (parseFloat(a.rent)||1e9)-(parseFloat(b.rent)||1e9);
  if(listSort==='新着')return (b.listDate||b.uploadDate||'').localeCompare(a.listDate||a.uploadDate||'');
  return 0;
 });
 if(!ps.length){document.getElementById('lbody').innerHTML='<div class="empty">該当なし</div>';return;}
 if(listGroupUp){
  const groups={};ps.forEach(p=>{const k=p.uploadDate||'未設定';(groups[k]=groups[k]||[]).push(p);});
  const keys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  document.getElementById('lbody').innerHTML=keys.map(k=>'<div class="sec-h" style="margin-top:14px">アップロード日：'+k+'（'+groups[k].length+'件）</div>'+groups[k].map(p=>listCard(p,_a)).join('')).join('');
 }else{
  document.getElementById('lbody').innerHTML=ps.map(p=>listCard(p,_a)).join('');
 }
}

function renderSub(){
 let list=PROPS.filter(p=>p.scorePre!==''&&p.scorePre!=null&&Number(p.scorePre)<=33).sort((a,b)=>Number(a.scorePre)-Number(b.scorePre));
 const total=list.length,shootN=list.filter(p=>p.needShoot).length,chkN=list.filter(p=>p.subStdJudge==='要確認').length,okN=list.filter(p=>p.subStdJudge==='許容').length;
 let L=list;
 if(subShootFilt==='要撮影のみ')L=L.filter(p=>p.needShoot);else if(subShootFilt==='要撮影なしのみ')L=L.filter(p=>!p.needShoot);
 if(subJudgeFilt==='要確認')L=L.filter(p=>p.subStdJudge==='要確認');else if(subJudgeFilt==='許容')L=L.filter(p=>p.subStdJudge==='許容');else if(subJudgeFilt==='未設定')L=L.filter(p=>!p.subStdJudge);
 let h='<div class="note" style="margin:0 2px 10px">オプション前スコアが<b>33点以下（第1基準34点に未達）</b>の物件一覧です。撮影・オプション・基準点以下の許容などの対応を管理します。<br>全'+total+'件 ／ 要撮影'+shootN+'件 ／ 要確認'+chkN+'件 ／ 許容'+okN+'件</div>';
 h+='<div class="qlabel">撮影フィルタ</div><div class="chips">'+['全て','要撮影のみ','要撮影なしのみ'].map(s=>'<button type="button" class="chip'+(subShootFilt===s?' on':'')+'" onclick="setSubF(\'s\',\''+s+'\')">'+s+'</button>').join('')+'</div>';
 h+='<div class="qlabel">判定フィルタ</div><div class="chips">'+['全て','要確認','許容','未設定'].map(s=>'<button type="button" class="chip'+(subJudgeFilt===s?' on':'')+'" onclick="setSubF(\'j\',\''+s+'\')">'+s+'</button>').join('')+'</div>';
 if(!L.length){h+='<div class="empty">該当する物件はありません</div>';document.getElementById('subbody').innerHTML=h;return;}
 const _a=anaAgg();
 L.forEach(p=>{
  const fs=finalScore(p),kj=kijun(fs),ss=pstat(p,_a),ds=daysSince(p.listDate);
  const jPill=p.subStdJudge==='要確認'?'<span class="pill p-pre">要確認</span>':p.subStdJudge==='許容'?'<span class="pill p-done">許容</span>':'';
  h+='<div class="card'+(p.needShoot?' needfix':'')+'"><div class="hd"><span class="pill '+(WK_PILL[WK_MAP[p.waku]||'is'])+'">'+p.waku.slice(0,3)+'</span>'+nmLink(p)+(p.needShoot?'<span class="pill p-pre">要撮影</span>':'')+jPill+'</div>';
  h+='<div class="info">'+[p.station,p.rent?p.rent+'万':'',(ds!=null?'掲載'+ds+'日':''),(ss.hasData?'PV '+ss.avg.toFixed(1)+'/日':'')].filter(Boolean).join(' ・ ')+'</div>';
  h+='<div style="margin-top:4px"><span class="pill p-st">素点 '+p.scorePre+'</span> <span class="pill '+(kj==='基準未満'?'p-pre':'p-st')+'">オプション込 '+fs+'（'+(kj==='基準未満'?'基準未満':kj+'基準')+'）</span></div>';
  h+='<div class="ck" style="margin-top:8px"><input type="checkbox" '+(p.needShoot?'checked':'')+' onchange="setShoot(\''+p.id+'\',this.checked)"><label>要撮影タグ</label></div>';
  h+='<div class="qlabel">撮影可能日（内見可能日）</div><input type="date" value="'+(p.shootDate||'')+'" onchange="setShootDate(\''+p.id+'\',this.value)" style="padding:8px">';
  h+='<div class="qlabel">基準点以下の判定</div><div class="chips">'+[['要確認','要確認'],['許容','基準点以下を許容']].map(o=>'<button type="button" class="chip'+(p.subStdJudge===o[0]?' on':'')+'" onclick="setSubJudge(\''+p.id+'\',\''+o[0]+'\')">'+o[1]+'</button>').join('')+'</div>';
  h+='<div class="qlabel">基準点以下へのアクション（メモ）</div><textarea onchange="setSubAction(\''+p.id+'\',this.value)" placeholder="例：CM追加で34点に乗せる／撮影し直して再評価／このまま様子見">'+esc(p.subStdAction||'')+'</textarea>';
  h+='</div>';
 });
 document.getElementById('subbody').innerHTML=h;
}
// ---------- 落とし選定（掲載を落とすべきランキング）----------
let dropOnlyData=false,dropSort='score';
function setDropFilt(){dropOnlyData=!dropOnlyData;renderDrop();}
function setDropSort(v){dropSort=v;renderDrop();}
function renderDrop(){
 const a=anaAgg();
 let L=PROPS.filter(p=>p.status==='掲載中').map(p=>({p:p,ss:pstat(p,a),ds:daysSince(p.listDate)}));
 L.forEach(r=>{r.score=dropScore(r.p,r.ss);});
 if(dropOnlyData)L=L.filter(r=>r.ss.hasData);
 if(dropSort==='days')L.sort((x,y)=>((y.ds==null?-1:y.ds)-(x.ds==null?-1:x.ds))||(x.score-y.score));else L.sort((x,y)=>x.score-y.score); // 既定: -100が上（最も落とすべき）
 const n=L.length;
 let h='<div class="note" style="margin:0 2px 10px">掲載中の物件を「落とすべき順」に並べています。<b>落としSCOREは 1（残す）〜 −100（最も落とすべき）</b>。反響の少なさ・詳細PVの低さ・掲載の長さ・低賃料を加味して算出します。上位ほど整理候補です。</div>';
 h+='<div class="chips" style="margin-bottom:8px"><button type="button" class="chip'+(!dropOnlyData?' on':'')+'" onclick="setDropFilt()">全件</button><button type="button" class="chip'+(dropOnlyData?' on':'')+'" onclick="setDropFilt()">PV/反響データ有りのみ</button></div>';
 h+='<div class="qlabel">並び替え</div><div class="chips" style="margin-bottom:8px"><button type="button" class="chip'+(dropSort==='score'?' on':'')+'" onclick="setDropSort(\'score\')">落としSCORE順</button><button type="button" class="chip'+(dropSort==='days'?' on':'')+'" onclick="setDropSort(\'days\')">掲載日数が長い順</button></div>';
 if(!n){h+='<div class="empty">掲載中の物件がありません</div>';document.getElementById('dropbody').innerHTML=h;return;}
 h+='<div class="tblwrap"><table class="tbl"><tr><th>順</th><th>物件</th><th>枠</th><th>掲載日数</th><th>一覧PV/日</th><th>詳細PV/日</th><th>問合せ</th><th>賃料</th><th>落としSCORE</th><th></th></tr>';
 L.forEach((r,i)=>{
  const sc=r.score;const col=sc<=-60?'var(--red)':sc<=-20?'var(--amber)':'var(--green)';
  const wpill='<span class="pill '+(WK_PILL[WK_MAP[r.p.waku]||'is'])+'">'+r.p.waku.slice(0,3)+'</span>';
  h+='<tr>'
   +'<td style="color:var(--text3)">'+(i+1)+'</td>'
   +'<td>'+lkName(r.p.id,esc(r.p.name).slice(0,14))+'</td>'
   +'<td>'+wpill+'</td>'

function setupCSV(){const dz=document.getElementById('csvdrop'),inp=document.getElementById('csvin');
 dz.addEventListener('click',()=>inp.click());
 ['dragenter','dragover'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.add('over');}));
 ['dragleave','dragend'].forEach(e=>dz.addEventListener(e,ev=>{ev.preventDefault();dz.classList.remove('over');}));
 dz.addEventListener('drop',ev=>{ev.preventDefault();dz.classList.remove('over');const f=ev.dataTransfer.files[0];if(f)routeImport(f);});
 inp.addEventListener('change',ev=>{if(ev.target.files[0])routeImport(ev.target.files[0]);inp.value='';});}
function routeImport(file){const n=(file.name||'').toLowerCase();if(n.endsWith('.xls')||n.endsWith('.xlsx')){processHankyo(file);}else{processCSV(file);}}
function readCSVText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{
 try{const u=new Uint8Array(r.result);
  if(u[0]===0xEF&&u[1]===0xBB&&u[2]===0xBF){res(new TextDecoder('utf-8').decode(u));return;}
  const sj=new TextDecoder('shift_jis').decode(u);
  // crude mojibake check: if many replacement chars, retry utf-8
  if((sj.match(/\uFFFD/g)||[]).length>5){res(new TextDecoder('utf-8').decode(u));}else res(sj);
 }catch(e){try{res(new TextDecoder('utf-8').decode(r.result));}catch(e2){rej(e2);}}};r.onerror=rej;r.readAsArrayBuffer(file);});}
function parseCSVRow(line){const r=[];let f='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(q){if(c==='"'&&line[i+1]==='"'){f+='"';i++;}else if(c==='"')q=false;else f+=c;}else{if(c==='"')q=true;else if(c===','){r.push(f);f='';}else f+=c;}}r.push(f);return r;}
function colFind(hdr,cands){for(const c of cands){const i=hdr.findIndex(h=>h.trim()===c);if(i>=0)return i;}for(const c of cands){const i=hdr.findIndex(h=>h.indexOf(c)>=0);if(i>=0)return i;}return -1;}
function parseDate(s){const m=(s||'').match(/(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);if(!m)return'';return m[1]+'-'+pad(+m[2])+'-'+pad(+m[3]);}
function findProp(name,code,room){
 name=normName(name);code=(code||'').trim();
 if(code){const c=PROPS.find(p=>p.suumoCode&&p.suumoCode===code);if(c)return c;}
 const full=normName(name+(room||''));
 return PROPS.find(p=>{const pn=normName(p.name);if(!pn)return false;return pn===name||full.indexOf(pn)>=0||pn.indexOf(name)>=0;});
}
async function processCSV(file){
 const txt=await readCSVText(file);
 const lines=txt.split(/\r?\n/).filter(l=>l.trim());
 if(lines.length<2){log('CSVが空です。','err');return;}
 const hdr=parseCSVRow(lines[0]).map(h=>h.trim());
 const rows=lines.slice(1).map(parseCSVRow);
 if(colFind(hdr,['受信日時'])>=0){processJDS(hdr,rows);return;}
 if(colFind(hdr,['住戸名寄せ点数'])>=0||colFind(hdr,['合計詳細PV(合計)','合計詳細PV'])>=0){promptBijikon(hdr,rows);return;}
 log('CSVの形式を認識できませんでした。JDS（反響）または ビジコン（PV詳細）を入れてください。','err');
}
async function processHankyo(file){
 if(typeof XLSX==='undefined'){log('Excel解析の準備中です。数秒おいて、もう一度ファイルを入れてください。','err');return;}
 let wb;try{const buf=await file.arrayBuffer();wb=XLSX.read(buf,{type:'array'});}catch(e){log('Excelの読込に失敗しました。','err');return;}
 const ws=wb.Sheets[wb.SheetNames[0]];if(!ws){log('シートが見つかりません。','err');return;}
 const M=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
 const norm=s=>String(s==null?'':s).replace(/\s/g,'');
 let hr=-1;for(let i=0;i<Math.min(M.length,15);i++){if((M[i]||[]).some(c=>norm(c)==='物件名')){hr=i;break;}}
 if(hr<0){log('反響報告書の形式を認識できませんでした。SUUMOの「空室物件//反響報告書」のExcelを入れてください。','err');return;}
 const H=M[hr].map(norm);
 const col=(name)=>{let i=H.indexOf(norm(name));if(i<0)i=H.findIndex(h=>h.indexOf(norm(name))>=0);return i;};
 const I={name:col('物件名'),room:col('部屋番号'),mad:col('間取'),rent:col('現在賃料(万円)'),line:col('沿線'),station:H.indexOf('駅'),walk:col('交通'),
   code:col('物件コード'),score:col('住戸名寄点数'),comp:col('競合物件数（合計）'),first:col('初回掲載日'),
   sa:col('得意なエリア'),sp:col('店舗案内ピックアップ'),cm:col('動画・ＣＭ')};
 if(I.rent<0)I.rent=col('現在賃料');
 const secRow=M[hr-1]?M[hr-1].map(norm):[];
 let dstart=-1;for(let c=0;c<secRow.length;c++){if(/\d{2}年\d{2}月\d{2}日～\d{2}年\d{2}月\d{2}日/.test(secRow[c])){dstart=c;break;}}
 I.pv=dstart>=0?dstart+3:-1;I.inq=dstart>=0?dstart+7:-1;I.lv=dstart>=0?dstart+1:-1;
 let repDate=twoDaysAgo();if(dstart>=0){const m=secRow[dstart].match(/\d{2}年\d{2}月\d{2}日～(\d{2})年(\d{2})月(\d{2})日/);if(m)repDate='20'+m[1]+'-'+m[2]+'-'+m[3];}
 if(I.name<0||I.pv<0){log('必要な列（物件名・当日PV）が見つかりませんでした。','err');return;}
 let matched=0,created=0,total=0;
 for(let r=hr+1;r<M.length;r++){
  const row=M[r];if(!row)continue;const name=String(row[I.name]||'').trim();if(!name)continue;total++;
  const code=String(row[I.code]||'').replace(/[^0-9A-Za-z]/g,'');
  const room=String(row[I.room]||'').trim();
  const rentN=parseFloat(String(I.rent>=0?row[I.rent]:'').replace(/[^0-9.]/g,''));const rent=isNaN(rentN)?'':String(rentN);
  const mad=String(I.mad>=0?row[I.mad]:'').trim();
  const station=String(I.station>=0?row[I.station]:'').trim();
  const line=String(I.line>=0?row[I.line]:'').trim();
  const wm=((String(I.walk>=0?row[I.walk]:'').match(/(\d+)\s*分/)||[])[1])||'';
  const sp=String(I.sp>=0?row[I.sp]:'').indexOf('◆')>=0,sa=String(I.sa>=0?row[I.sa]:'').indexOf('◆')>=0,cm=String(I.cm>=0?row[I.cm]:'').indexOf('◆')>=0;
  const score=I.score>=0?(parseInt(String(row[I.score]||'').replace(/[^0-9]/g,''))):NaN;
  const comp=I.comp>=0?String(row[I.comp]||'').trim():'';
  const first=I.first>=0?parseDate(String(row[I.first]||'')):'';
  const pv=parseInt(String(row[I.pv]||'').replace(/[^0-9]/g,''))||0;
  const lv=I.lv>=0?(parseInt(String(row[I.lv]||'').replace(/[^0-9]/g,''))||0):0;
  const inq=I.inq>=0?(parseInt(String(row[I.inq]||'').replace(/[^0-9]/g,''))||0):0;
  let p=findProp(name,code,room);
  if(!p){
   p={id:'p'+nowTS()+'_'+r,name:name,room:room,line:line,station:station,walkMin:wm,madori:mad,rent:rent,
     status:'掲載中',waku:autoWakuImport(station,mad,rent||'0'),pdf:'',propNo:'',suumoCode:code,uploadDate:today(),
     statusLog:[],listDate:first||'',belowCount:'',t1Count:'',t2Count:'',t3Count:'',photoCount:'',scorePre:'',
     storePick:sp,specArea:sa,video:cm,optReviewed:false,optReviewedAt:'',compDataAt:'',optAppliedAt:'',
     needShoot:false,shootDate:'',subStdJudge:'',subStdAction:'',analysisMemo:'',
     csvInq:0,csvPV:0,csvInqB:0,csvScore:'',csvAsOf:'',suumoListStart:first||'',compTotal:comp};
   PROPS.push(p);created++;
  }else{matched++;if(code&&!p.suumoCode)p.suumoCode=code;}
  if(first){if(!p.suumoListStart)p.suumoListStart=first;if(!p.listDate)p.listDate=first;}
  if(!HIST[repDate])HIST[repDate]={};

  Object.keys(EVENTS).forEach(k=>{if(k.indexOf('X|'+repDate+'|'+p.id+'|')===0)delete EVENTS[k];});
  for(let j=0;j<inq;j++)EVENTS['X|'+repDate+'|'+p.id+'|'+j]={date:repDate,name:name,code:code,propId:p.id};
  if(!p.csvAsOf||repDate>=p.csvAsOf){
   p.csvAsOf=repDate;p.storePick=sp;p.specArea=sa;p.video=cm;
   if(!isNaN(score)){p.csvScore=String(score);const opt=(sp?4:0)+(sa?2:0)+(cm?2:0);p.scorePre=String(Math.max(0,score-opt));}
   if(comp!=='')p.compTotal=comp;
   if(!p.madori&&mad)p.madori=mad;if((p.rent===''||p.rent==null)&&rent!=='')p.rent=rent;if(!p.station&&station)p.station=station;
  }
 }
 recompute();saveAll();
 log('反響報告書取込：'+repDate+'分 '+total+'行（更新'+matched+'件／新規'+created+'件）。反響・オプション・名寄点数・競合数・掲載開始日を反映（PVはPC閲覧のみのため取り込まず、PVはビジコンから取得します）。','ok');
}
function processJDS(hdr,rows){
 const di=colFind(hdr,['受信日時']);
 const ni=colFind(hdr,['物件名１','物件名1','物件名']);
 const ci=colFind(hdr,['物件コード','SUUMO物件コード','管理番号']);
 const si=colFind(hdr,['駅','沿線駅']);
 const mi=colFind(hdr,['間取り','間取']);
 if(ni<0){log('JDS：物件名の列が見つかりませんでした。','err');return;}
 let added=0,total=0,matched=0;
 const seenProps={};
 rows.forEach(row=>{
  const name=(row[ni]||'').trim();if(!name)return;
  const dt=row[di]||'';const date=parseDate(dt);
  const code=ci>=0?(row[ci]||'').trim():'';
  const key=(dt||'')+'|'+name+'|'+(si>=0?(row[si]||''):'');
  const p=findProp(name,code,'');
  if(p){if(code&&!p.suumoCode)p.suumoCode=code;seenProps[p.id]=1;matched++;}
  EVENTS[key]={date:date,name:name,code:code,propId:p?p.id:null};
  total++;
 });
 added=Object.keys(EVENTS).length;
 recompute();saveAll();
 const mc=Object.keys(seenProps).length;
 log('JDS取込：'+total+'行を処理（蓄積イベント '+added+'件）。'+mc+'物件にマッチ。同じファイルを再投入しても二重計上しません。','ok');
}

function anaAgg(){
 const pv={},days={},inq={},lv={};
 Object.keys(HIST).forEach(d=>{const o=HIST[d];Object.keys(o).forEach(pid=>{pv[pid]=(pv[pid]||0)+(+o[pid].pv||0);lv[pid]=(lv[pid]||0)+(+o[pid].listv||0);days[pid]=(days[pid]||0)+1;});});
 Object.keys(EVENTS).forEach(k=>{const e=EVENTS[k];if(e.propId)inq[e.propId]=(inq[e.propId]||0)+1;});
 return{pv,days,inq,lv};
}
function pstat(p,a){const pv=a.pv[p.id]||0,d=a.days[p.id]||0,iq=a.inq[p.id]||0,lv=(a.lv&&a.lv[p.id])||0;return{p:p,pv:pv,d:d,avg:d>0?pv/d:0,lv:lv,lvAvg:d>0?lv/d:0,inq:iq,rate:pv>0?iq/pv:0,walk:parseInt(p.walkMin)||null,rent:parseFloat(p.rent),bt:!!p.btSep,wash:!!p.washStand,hasData:d>0};}
// 落としSCORE: 1（残す）〜 -100（最も落とすべき）
function dropScore(p,ss){
 const days=daysSince(p.listDate);
 const inqDay=ss.d>0?ss.inq/ss.d:0, pvDay=ss.avg, rent=parseFloat(p.rent)||0;
 const fInq=1-Math.min(inqDay/0.3,1);          // 反響が少ないほど落とす
 const fPv =1-Math.min(pvDay/5,1);             // 詳細PV/日が少ないほど落とす
 const fDay=days!=null?Math.min(days/45,1):0.3;// 掲載が長いほど落とす
 const fRent=1-Math.min(rent/20,1);            // 低額ほど落とす（高額は残す）
 const risk=0.40*fInq+0.30*fPv+0.15*fDay+0.15*fRent; // 0..1
 return Math.round(1-101*risk);                 // 1..-100
}
function amean(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function propScore(s){
 if(!s||!s.hasData)return null;
 const inqDay=s.d>0?s.inq/s.d:0,pvDay=s.avg,rate=s.rate;
 let sc=50*Math.min(inqDay/0.4,1)+28*Math.min(pvDay/25,1)+22*Math.min(rate/0.06,1);
 const ds=daysSince(s.p.listDate);
 if(ds!=null&&ds>30){const stale=1-Math.min(inqDay/0.2,1);sc-=Math.min(20,(ds-30)/3)*stale;}
 return Math.max(0,Math.min(100,Math.round(sc)));
}
function scoreTier(sc){return sc>=75?'S':sc>=55?'A':sc>=35?'B':'C';}
function tierPill(sc){if(sc==null)return '<span class="pill p-pre">スコア -</span>';const t=scoreTier(sc);const c=t==='S'?'p-act':t==='A'?'p-op':t==='B'?'p-st':'p-pre';return '<span class="pill '+c+'">'+t+' '+sc+'</span>';}
function daysSince(ds){if(!ds)return null;const t=new Date(String(ds).replace(/-/g,'/')),n=new Date();return Math.floor((n-t)/86400000);}

   statusLog:[],listDate:status==='要入稿'?'':_isoBack(age),belowCount:String(2+Math.floor(_rnd()*9)),t1Count:String(3+Math.floor(_rnd()*10)),t2Count:String(1+Math.floor(_rnd()*6)),t3Count:String(Math.floor(_rnd()*4)),photoCount:String(5+Math.floor(_rnd()*6)),
   scorePre:status==='掲載中'?(28+Math.round(_rnd()*16)):'',storePick:_rnd()<0.35,specArea:false,video:_rnd()<0.3,optReviewed:_rnd()<0.4,optReviewedAt:'',compDataAt:_isoBack(2),optAppliedAt:'',needShoot:_rnd()<0.45,shootDate:'',subStdJudge:(_rnd()<0.3?'要確認':(_rnd()<0.4?'許容':'')),subStdAction:'',
   csvInq:0,csvPV:0,csvInqB:0,csvScore:'',csvAsOf:'',suumoListStart:(status==='掲載中'?_isoBack(age):''),compTotal:''};
  if(i%37===0)p.statusLog=[{memo:'先行申込あり、2番手で打診可',ts:nowTS()}];
  if(i%29===0)p.analysisMemo='同価格帯で上位。反響率も高め。オプション追加余地を検討。';
  props.push(p);
  if(status!=='掲載中')continue;
  if(p.storePick||p.video){const split=Math.min(Math.max(Math.floor((age<24?age:24)/2),3),12);p.optAppliedAt=_isoBack(split);}
  let basePV=13+(walk<=10?5:(walk>=13?-6:-2))+(bt?3:-5)+(wash?1:0)+Math.round((9-rent)*0.7)+(cat==='ファミリー'?-4:(cat==='カップル'?-1:0));
  if(basePV<1)basePV=1;
  let totPV=0;
  for(let n=(age<24?age:24);n>=rangeEnd;n--){const date=_isoBack(n);const pv=Math.max(0,Math.round(basePV+(_rnd()*6-3)));hist[date]=hist[date]||{};hist[date][id]={pv:pv,inqB:Math.round(pv*0.5),listv:Math.round(pv*(3+_rnd()*3))};totPV+=pv;}
  let rate=0.05;if(cat==='ファミリー')rate=0.018;else if(rent>=20)rate=0.012;else if(cat==='カップル')rate=0.03;
  if(walk>10)rate*=0.6;if(!bt)rate*=0.6;
  let R=Math.round(totPV*rate);
  const dates=Object.keys(hist).filter(dt=>hist[dt][id]);
  for(let q=0;q<R&&dates.length;q++){const dt=dates[Math.floor(_rnd()*dates.length)];events['ev'+(ev++)]={date:dt,name:name,code:p.suumoCode,propId:id};}
 }
 PROPS=props;HIST=hist;EVENTS=events;
 await saveAll();recompute();toast('サンプル180件を投入しました');tab('dash');
 };
 if(PROPS.length)uiConfirm('現在のデータを置き換えてサンプル180件を投入します。よろしいですか？',run);else run();
}
