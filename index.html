<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Taro-Mira｜反響効果ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+JP:wght@400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f7f5;--card:#fff;--tx:#1a1a1a;--sub:#9b9a97;--bd:rgba(0,0,0,.06);--acc:#2c2c2c;--blue:#3b82f6;--red:#ef4444;--grn:#22c55e;--amb:#f59e0b;--pur:#8b5cf6;--gray:#d1d5db;--mut:#a0a0a0;--sh:0 1px 3px rgba(0,0,0,.06);--r:12px;--ft:-apple-system,'SF Pro Display','Helvetica Neue','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:var(--ft);background:var(--bg);color:var(--tx);font-size:14px;-webkit-font-smoothing:antialiased}
header{background:var(--card);border-bottom:1px solid var(--bd);padding:24px 0 20px}
.wrap{max-width:880px;margin:0 auto;padding:0 20px}
.kabel{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--sub);text-transform:uppercase;margin-bottom:2px}
h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--tx)}
.sub{font-size:12px;color:var(--sub);margin-top:3px;font-weight:400;line-height:1.5}
.tag{font-size:11px;color:var(--sub);margin-top:2px;font-weight:500;letter-spacing:.02em}
.controls{padding:16px 18px;background:var(--card);border:1px solid var(--bd);border-radius:14px;box-shadow:var(--sh);margin:6px 0 2px;display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px 22px;align-items:start}
.cg{margin-bottom:0!important}
.cg{margin-bottom:14px}.cg>label{font-size:10px;font-weight:600;color:var(--sub);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block}
.tgs{display:flex;gap:6px;flex-wrap:wrap}
.tg{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--bd);border-radius:20px;background:var(--card);font-family:var(--ft);font-size:12px;font-weight:500;color:var(--tx);cursor:pointer;transition:all .15s ease}.tg:hover{border-color:#c0c0c0;background:#fafafa}
.tg.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.tg.rk{font-variant-numeric:tabular-nums}
.bx{width:14px;height:14px;border-radius:4px;border:1.5px solid #d0d0d0;display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s}.tg.on .bx{background:var(--blue);border-color:var(--blue);color:#fff}
.seg{display:inline-flex;gap:2px;flex-wrap:wrap;background:#f0f0ee;border-radius:10px;padding:3px}
.seg button{border:none;background:transparent;border-radius:8px;padding:6px 12px;font-family:var(--ft);font-size:12px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .12s ease}
.seg button:hover{color:var(--tx)}
.seg button.on{background:var(--card);color:var(--tx);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.10)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
.kpi{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);text-align:center}.kpi .n{font-size:26px;font-weight:700;letter-spacing:-.02em;color:var(--tx)}.kpi .l{font-size:10px;color:var(--sub);margin-top:4px;font-weight:500;letter-spacing:.02em}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 0;font-size:11px;color:var(--sub);align-items:center;line-height:1.6}
.sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:3px;vertical-align:middle}
.tablewrap{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 10px;font-weight:600;font-size:10px;letter-spacing:.04em;color:var(--sub);border-bottom:1px solid var(--bd);background:transparent;white-space:nowrap;position:sticky;top:0}
td{padding:8px 10px;border-bottom:1px solid var(--bd)}
tr{cursor:pointer;transition:background .1s}tr:hover td{background:rgba(0,0,0,.02)}
td.bd{font-variant-numeric:tabular-nums;font-size:12px;color:var(--tx)}
td.hsm,.th.hsm,.bd.hsm,th.hsm{display:none}
@media(min-width:768px){td.hsm,.bd.hsm,th.hsm{display:table-cell}}
.st{font-weight:600;white-space:nowrap;font-size:13px}
.nd{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}.nd.bd{padding:2px 8px;border-radius:10px}
.gb{font-size:11px;color:var(--sub);line-height:1.4;max-width:180px}
.gv{font-size:11px;color:var(--sub);max-width:180px}
.zone{font-size:11px;line-height:1.4}
.rrz{font-size:11px;color:var(--sub)}
.sup{font-size:11px;color:var(--sub)}
.spark{width:100%;height:40px}
.meta{font-size:11px;color:var(--sub);padding:4px 16px 8px;line-height:1.6}
#detail{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);overflow-y:auto;padding:40px 16px}
#detail.show{display:block}
#dbody{max-width:640px;margin:0 auto;background:var(--card);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:24px;position:relative}
.x{position:absolute;top:12px;right:16px;border:0;background:none;font-size:22px;cursor:pointer;color:var(--sub);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s}.x:hover{background:rgba(0,0,0,.06)}
.dphero{background:rgba(59,130,246,.06);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.hk{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.hv{font-size:16px;font-weight:700;color:var(--tx);line-height:1.4}
.hn{font-size:10px;color:var(--sub);margin-top:3px}
.dpopp{background:rgba(239,68,68,.05);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.ok{font-size:10px;font-weight:700;color:var(--red);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.ov{font-size:16px;font-weight:700;color:var(--tx);line-height:1.4}
.dpchart{display:flex;gap:4px;margin-top:14px;background:rgba(0,0,0,.02);border-radius:10px;padding:16px 8px 8px}
.dpplotwrap{flex:1;position:relative;height:200px}
.dpplot{display:flex;align-items:flex-end;height:100%;gap:0}
.dpbar{border-radius:2px 2px 0 0;flex:1;max-width:10px}
.dpbox{text-align:center}
.dpcol{flex:1;display:flex;flex-direction:row;align-items:flex-end;justify-content:center;gap:1px;min-width:10px}
.dpgl{fill:var(--blue);opacity:.8}.dpyl{fill:#d1d5db;opacity:.6}
.dppk{font-size:8px;color:var(--amb);white-space:nowrap;position:absolute;top:-14px;left:50%;transform:translateX(-50%)}
.dpaxc{flex:1;font-size:8px;color:var(--sub);text-align:center;padding-top:4px;border-top:1px solid var(--bd);min-width:6px}
.dpaxis{flex:1;display:flex}
.dpyax{font-size:8px;color:var(--sub);text-align:right;min-width:28px;display:flex;flex-direction:column-reverse;justify-content:space-between;padding-bottom:0}
.dpgrid{position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none}
.dpypad{min-width:32px}
.dplg{display:flex;gap:10px;margin-top:6px;font-size:10px;color:var(--sub)}
.dpbrk{display:flex;gap:10px;margin-top:8px;font-size:10px;color:var(--sub)}
.dparow{display:flex;align-items:flex-start;gap:4px}
.dpobl,.dpobr{position:absolute;left:0;right:0;height:100%;pointer-events:none;display:flex;align-items:flex-end}
.dpcap{font-size:10px;color:var(--sub);margin-top:6px;text-align:center}
.dpnote{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.5}
.foot{text-align:center;font-size:10px;color:var(--sub);padding:24px 0;margin-top:20px;border-top:1px solid var(--bd)}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}h1{font-size:18px}#dbody{padding:16px}}
.dtcell,.ctcell{white-space:nowrap}
.dtin{font-family:var(--ft);font-size:11px;border:1px solid var(--bd);border-radius:6px;padding:2px 5px;background:#fff;color:var(--tx);cursor:pointer;min-width:104px}
.dtin:focus,.ctin:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,.12)}
.dtin.set,.ctin.set{border-color:#c9b15a;background:#fffdf5}
.ctin{font-family:var(--ft);font-size:11px;border:1px solid var(--bd);border-radius:6px;padding:2px 4px;background:#fff;color:var(--tx);width:44px;text-align:center}
#thDate,#thCnt{font-size:9px;font-weight:600;color:var(--sub)}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:var(--tx)}
#dateArrow,#cntArrow{color:var(--blue);font-size:9px}
.scrollhint{font-size:10px;color:var(--sub);text-align:center;padding:6px 0 2px;letter-spacing:.02em}
th{z-index:4}
th.stick,td.stick{position:sticky;left:0;background:var(--card);box-shadow:1px 0 0 var(--bd)}
th.stick{z-index:6}
td.stick{z-index:2;min-width:92px;max-width:140px}
tr:hover td.stick{background:#fafafa}
.gb,.gv,.zone,.rrz,.sup{max-width:118px}
.lctool{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.lcbtn{display:inline-flex;align-items:center;background:transparent;border:none;color:#aab0b9;font-size:11px;font-weight:400;padding:2px 5px;border-radius:6px;cursor:pointer;text-decoration:underline;text-decoration-color:#dcdfe4;text-underline-offset:2px}
.lcbtn:hover{color:#6a7686;background:#f1f2f4;text-decoration-color:#aab0b9}
.lcstatus{font-size:11px;color:var(--sub)}
.controls input[type=search]{width:100%;padding:7px 11px;border:1px solid var(--bd);border-radius:9px;font-family:var(--ft);font-size:12px;background:var(--card);color:var(--tx)}
.controls input[type=search]:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.mcell{min-width:140px}
.memoin{width:140px;border:1px solid transparent;background:transparent;font-family:var(--ft);font-size:12px;color:var(--tx);padding:4px 7px;border-radius:7px}
.memoin::placeholder{color:#c7ccd3}
.memoin:hover{background:#f5f5f4}
.memoin:focus{outline:none;background:#fff;border-color:var(--bd);box-shadow:0 0 0 2px rgba(59,130,246,.12)}
.memoin.set{background:#fffdf5;border-color:#efe6c2}
.bcell{min-width:150px}
.brow{display:flex;align-items:center;gap:6px;padding:1px 0}
.src2{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:5px;font-size:9px;font-weight:600;flex:0 0 auto}
.src2.r{background:#E3F3EC;color:#1F9266}.src2.a{background:#FBE9E9;color:#D85A52}
.din{border:none;background:transparent;font:inherit;font-size:13px;color:#1f2937;padding:2px 3px;border-radius:6px;width:54px;-webkit-appearance:none}
.din:hover{background:#f1f2f4}.din:focus{outline:none;background:#fff;box-shadow:0 0 0 2px rgba(48,161,78,.3)}
.brow.a .din:focus{box-shadow:0 0 0 2px rgba(229,72,77,.3)}
.nin{border:none;background:#f3f4f6;font:inherit;font-size:11px;color:#6a7686;width:34px;text-align:center;padding:3px 2px;border-radius:6px;-webkit-appearance:none;-moz-appearance:textfield}
.nin::-webkit-outer-spin-button,.nin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.nin::placeholder{color:#c2c7cf}
.nin:hover{background:#e9ebee}
.nin:focus{outline:none;background:#fff;color:#1f2937;box-shadow:0 0 0 2px rgba(31,146,102,.3)}
.brow.a .nin:focus{box-shadow:0 0 0 2px rgba(216,90,82,.3)}
.nin.set{color:#1f2937;font-weight:600;background:#eef0f2}
.dcell{position:relative;display:inline-block;width:52px;height:22px;flex:0 0 auto}
.dpick{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0;padding:0;border:none;cursor:pointer}
.dlab{position:absolute;inset:0;display:flex;align-items:center;padding-left:4px;font-size:13px;color:#1f2937;border-radius:6px;pointer-events:none}
.dcell:hover .dlab{background:#f1f2f4}
.dcell:focus-within .dlab{background:#fff;box-shadow:0 0 0 2px rgba(31,146,102,.35)}
.brow.a .dcell:focus-within .dlab{box-shadow:0 0 0 2px rgba(216,90,82,.35)}
.dlab.empty{color:#c2c7cf}
.dcell{position:relative;display:inline-flex;align-items:center;gap:1px}
.din{border:none;background:transparent;font:inherit;font-size:13px;color:#1f2937;width:40px;text-align:left;padding:2px 2px;border-radius:6px;-webkit-appearance:none}
.din::placeholder{color:#c7ccd3}
.din:hover{background:#f1f2f4}.din:focus{outline:none;background:#fff;box-shadow:0 0 0 2px rgba(31,146,102,.3)}
.brow.a .din:focus{box-shadow:0 0 0 2px rgba(216,90,82,.3)}
.dpwrap{position:relative;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px}
.dpwrap:hover{background:#eef0f2}
.dpsvg{color:#aab0b9;pointer-events:none}
.dpwrap:hover .dpsvg{color:#6a7686}
.dpick{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;border:none;padding:0;margin:0}
#calpop{background:#fff;border:1px solid #e0e3e8;border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.14);padding:8px;z-index:9999;width:214px;font-family:inherit}
.calhd{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;margin:2px 2px 6px;color:#1f2937}
.calnav{border:none;background:transparent;font-size:16px;cursor:pointer;color:#6a7686;padding:2px 9px;border-radius:6px}
.calnav:hover{background:#eef0f2}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.calwd{font-size:10px;color:#9aa2ad;text-align:center;padding:2px 0}
.calday{font-size:12px;text-align:center;padding:5px 0;border-radius:6px;cursor:pointer;color:#1f2937}
.calday:hover{background:#E3F3EC;color:#1F9266}
.lcbtn{cursor:pointer}
header.top{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--bd);padding:12px 0;z-index:50}
.ttl{font-size:17px;font-weight:700;color:#1a3d6b;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ttl .hsub{font-size:11px;font-weight:400;color:var(--sub)}
.back{font-size:12px;color:var(--sub);text-decoration:none;border:1px solid var(--bd);padding:3px 10px;border-radius:8px;margin-left:auto}
.back:hover{background:#f1f2f4}
.lcnum{text-align:center}
.hmono{display:flex;align-items:center;gap:13px}
.hbadge{width:38px;height:38px;border-radius:11px;background:#1a3d6b;display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:0 2px 6px rgba(26,61,107,.25)}
.hcol{display:flex;flex-direction:column;gap:1px;min-width:0}
.htt{font-size:18px;font-weight:700;color:#1a3d6b;line-height:1.15}
.hsb{font-size:11px;color:var(--sub)}
.hbtn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#1a3d6b;text-decoration:none;border:1px solid #d8dee8;background:#f6f8fb;padding:6px 13px;border-radius:9px;font-weight:500;white-space:nowrap}
.hbtn:hover{background:#eef2f7}
.sync2{font-size:11px;color:var(--sub);margin-left:6px}
.bcell{min-width:190px}
.bsum{display:flex;gap:10px;align-items:center;margin-bottom:5px;font-size:11px;color:var(--sub);flex-wrap:wrap}
.bsum .bdate{font-weight:600;color:var(--tx)}
.bsum .bmon b{font-weight:700}.bsum .bmon b.r{color:#1F9266}.bsum .bmon b.a{color:#D85A52}
.binput{display:flex;align-items:center;gap:5px}
.upbtn{border:none;background:#1a3d6b;color:#fff;font-size:11px;font-weight:600;padding:5px 11px;border-radius:8px;cursor:pointer;white-space:nowrap}
.upbtn:hover{background:#163357}
/* ===== 過去の反響物件例 (rx-) ===== */
.rxopen{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin:14px 0 4px;padding:11px;border:1px solid #1A3D6B;background:#1A3D6B;color:#fff;border-radius:10px;font:inherit;font-size:13px;font-weight:700;cursor:pointer}
.rxopen:hover{background:#163255}
.rxmask{position:fixed;inset:0;background:rgba(18,28,42,.46);display:none;align-items:flex-start;justify-content:center;z-index:9000;padding:24px 12px;overflow:auto}
.rxmask.show{display:flex}
.rxsheet{background:#f7f8fa;border-radius:16px;width:100%;max-width:980px;box-shadow:0 24px 70px rgba(0,0,0,.34);position:relative;margin:auto}
.rxx{position:absolute;top:12px;right:14px;width:30px;height:30px;border-radius:8px;border:1px solid #e6e8ec;background:#fff;color:#6a7686;font-size:18px;line-height:1;cursor:pointer;z-index:2}
.rxhead{background:#fff;border-bottom:1px solid #e6e8ec;border-radius:16px 16px 0 0;padding:15px 18px;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.rxbadge{width:34px;height:34px;border-radius:10px;background:#1A3D6B;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.rxtt{font-size:15px;font-weight:700;color:#1A3D6B;line-height:1.1}
.rxsub{font-size:11px;color:#6a7686}
.rxcount{font-size:11px;color:#6a7686;background:#eef0f2;border-radius:999px;padding:2px 10px}
.rxsp{margin-left:auto}
.rxctrls{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rxchip{border:1px solid #e6e8ec;background:#fff;border-radius:999px;padding:4px 11px;font:inherit;font-size:11px;color:#6a7686;cursor:pointer}
.rxchip.on{background:#1A3D6B;border-color:#1A3D6B;color:#fff}
.rxbody{padding:16px 18px 20px}
.rxmuted{color:#9aa2ad}
.rxbtn{display:inline-flex;align-items:center;gap:5px;font:inherit;font-size:11px;font-weight:600;border-radius:8px;padding:6px 11px;cursor:pointer;border:1px solid #e6e8ec;background:#fff;color:#1A3D6B}
.rxbtn.solid{background:#1A3D6B;color:#fff;border-color:#1A3D6B}
.rxik{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:1px 7px;border-radius:6px}
.rxik.pre{background:#eaf1f9;color:#1A3D6B}
.rxik.post{background:#FBE9E9;color:#D85A52}
.rxmchip{display:inline-block;font-size:10px;color:#6a7686;background:#f1f2f4;border-radius:6px;padding:1px 7px;margin:1px 2px 1px 0}
.rxprice{font-size:13px;font-weight:700;color:#1A3D6B}
.rxtblwrap{overflow-x:auto;border:1px solid #e6e8ec;border-radius:12px;background:#fff}
.rxtbl{width:100%;border-collapse:collapse;min-width:900px}
.rxtbl th{font-size:10px;color:#9aa2ad;font-weight:600;text-align:right;padding:9px 10px;border-bottom:1px solid #e6e8ec;background:#fafbfc;white-space:nowrap;cursor:pointer;user-select:none}
.rxtbl th.l{text-align:left}
.rxtbl th .rxar{color:#1A3D6B}
.rxtbl th.grp{color:#1A3D6B;font-weight:700}
.rxtbl td{padding:9px 10px;border-bottom:1px solid #f0f1f3;font-size:12px;vertical-align:top;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.rxtbl td.l{text-align:left;white-space:normal}
.rxtbl tr.rxclick{cursor:pointer}
.rxtbl tr.rxclick:hover td{background:#fafbfc}
.rxtbl td.sep,.rxtbl th.sep{border-left:1px solid #eef0f2}
.rxbigpre{font-weight:700;color:#1A3D6B}
.rxexp td{background:#f8fafc!important;padding:0}
.rxexpbox{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.rxpp{border:1px solid #e6e8ec;border-radius:10px;padding:11px 13px}
.rxpp.pre{border-color:#cfe0f2;background:#fcfdff}.rxpp.post{border-color:#f3d2cf}
.rxpphd{font-size:11px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.rxkv{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px dashed #e3e6ea}
.rxkv b{font-weight:700;color:#1A3D6B}

function rxEsc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function rxNum(s){if(s==null)return null;var m=String(s).replace(/[, ]/g,'').match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}
function rxTotalMan(p){var r=rxNum(p.rent);if(r==null)return null;var m=rxNum(p.mgmt);return r+((m||0)/10000);}
function rxIkari(p){var L=p.wakuLog;if(!Array.isArray(L))return null;for(var i=0;i<L.length;i++){if(L[i]&&L[i].waku==='IKARI'&&L[i].date)return L[i].date;}return null;}
function rxSeries(p){var out=[],ds=Object.keys(RXHIST).sort();for(var i=0;i<ds.length;i++){var o=RXHIST[ds[i]],e=o&&o[p.id];if(!e)continue;out.push({date:ds[i],pv:+e.pv||0,listv:+e.listv||0,inqB:+e.inqB||0,comp:+e.comp||0,b0:+e.b0||0,b1:+e.b1||0,b2:+e.b2||0,b3:+e.b3||0});}return out;}
function rxSum(a,k){var s=0;for(var i=0;i<a.length;i++)s+=a[i][k];return s;}
function rxDrift(a){if(a.length<2)return 0;var f=a[0].pv||1,l=a[a.length-1].pv;return Math.round((l-f)/f*100);}
function rxStat(seg){var d=seg.length;return {d:d,lv:rxSum(seg,'listv'),pv:rxSum(seg,'pv'),iq:rxSum(seg,'inqB'),aLv:d?rxSum(seg,'listv')/d:0,aPv:d?rxSum(seg,'pv')/d:0,aIq:d?rxSum(seg,'inqB')/d:0,drift:rxDrift(seg),comp:d?Math.round(rxSum(seg,'comp')/d):0};}
function rxAgg(p){var ser=rxSeries(p),ik=rxIkari(p),pre=[],post=[];for(var i=0;i<ser.length;i++){(!ik||ser[i].date<ik?pre:post).push(ser[i]);}return {ser:ser,ik:ik,pre:rxStat(pre),post:rxStat(post),all:rxStat(ser),inqAll:rxSum(ser,'inqB'),spre:pre,spost:post};}

 function card(id,nm,un){var t=tot[id]||{st:{},n:0,sc:0,ln:{}};var stc=Object.keys(t.st).length,lnc=Object.keys(t.ln).length;return '<div class="sp-sc'+(un?' un':'')+'"><div class="sp-scn">'+nm+'</div><div class="sp-scl">沿線 '+lnc+'</div><div class="sp-scg"><span>'+stc+'駅</span><span>'+t.n+' 駅×間取り</span><span class="sp-scs">スコア'+t.sc+'</span></div>'+rentline(id)+'</div>';}
 var sumh='<div class="sp-summary">';SPSTAFF.forEach(function(s){sumh+=card(s.id,s.n,false);});sumh+=card('','未割当',true);sumh+='</div>';
 var bar='<div class="sp-bar"><div class="sp-grp"><span class="sp-lbl">都県</span>'+spChip('pf','all','一都三県')+spChip('pf','東京','東京')+spChip('pf','神奈川','神奈川')+spChip('pf','千葉','千葉')+'</div>'+
   '<div class="sp-grp"><span class="sp-lbl">間取り</span>'+spChip('ct','all','全て')+spChip('ct','シングル','シングル')+spChip('ct','カップル','カップル')+spChip('ct','ファミリー','ファミリー')+'</div></div>';
 var h='<div class="sp-xscroll" onwheel="spWheel(event,this)"><table class="sp-tbl"><thead><tr>'+
   '<th class="l">#</th><th class="l" onclick="spS(\'name\')">路線'+spArrow('name')+'</th><th class="l">メイン担当<span class="sp-note">(目安)</span></th>'+
   '<th onclick="spS(\'stations\')">駅数'+spArrow('stations')+'</th><th onclick="spS(\'entries\')">駅×間取り'+spArrow('entries')+'</th><th onclick="spS(\'t10\')">Top10'+spArrow('t10')+'</th><th onclick="spS(\'score\')">スコア'+spArrow('score')+'</th><th class="l">メモ</th></tr></thead><tbody>';
 L.forEach(function(o,i){
   var a=LASSIGN[o.l]||'';var lj=spJs(o.l);
   var sel=spStaffSel(a,'setLA(\''+lj+'\',this.value)');
   var lm=LMEMO[o.l]||'';
   var mi='<input class="sp-memo'+(lm?' on':'')+'" value="'+spEsc(lm)+'" placeholder="メモ" onchange="setLM(\''+lj+'\',this.value)" onclick="event.stopPropagation()">';
   h+='<tr class="sp-lrow" onclick="spToggle(\''+lj+'\')"><td class="l rk">'+(i+1)+'</td><td class="l">'+o.l+'</td><td class="l">'+sel+'</td><td>'+o.stations+'</td><td>'+o.n+'</td><td>'+o.t10+'</td><td class="sc">'+o.score+'</td><td class="l">'+mi+'</td></tr>';
   if(spOpen===o.l)h+='<tr class="sp-exp"><td colspan="8">'+spDetail(o)+'</td></tr>';
 });
 h+='</tbody></table></div>';
 var body=document.getElementById('spbody');if(!body)return;
 body.innerHTML='<div class="sp-head"><div class="sp-ht">沿線担当割り振り分析 <span class="sp-tools"><button class="sp-tb sp-sync" type="button" onclick="spSyncNow()">🔄 今すぐ同期</button><button class="sp-tb" type="button" onclick="spBackup()">⬇ バックアップ</button><button class="sp-tb" type="button" onclick="spRestoreClick()">⬆ 復元</button></span></div><div class="sp-hs">担当別の集計は「駅×間取りごとの担当」で計算します。沿線の「メイン担当」はあくまで目安メモです。メモ・担当は全PCで共有。opo帯＝最も伸ばせる価格帯。上位スコア＝Σ(101−順位)。</div></div>'+
   sumh+bar+'<div class="sp-cnt">対象 '+spRows().length+' 駅×間取り ／ '+L.length+'沿線（'+(spPref==='all'?'一都三県':spPref)+' ／ '+(spCat==='all'?'全間取り':spCat)+'）</div>'+h;
}
function spDetail(o){
 var ents=o.ents.filter(function(d){return spDPref==='all'||d.pref===spDPref;});
 var pc={'東京':{},'神奈川':{},'千葉':{}};o.ents.forEach(function(d){pc[d.pref][d.st]=1;});
 var sum='<div class="sp-psum">';['東京','神奈川','千葉'].forEach(function(p){var n=Object.keys(pc[p]).length;if(n)sum+='<span>'+spPB(p)+' '+n+'駅</span>';});sum+='</div>';
 function dc(p,lab){var cls=p==='東京'?'tk':p==='神奈川'?'kn':p==='千葉'?'cb':'';return '<span class="sp-chip sm '+cls+(spDPref===p?' on':'')+'" onclick="spSetDPref(\''+p+'\')">'+lab+'</span>';}
 var chips='<div class="sp-dpf"><span class="sp-lbl">沿線内 都県</span>'+dc('all','全体')+dc('東京','東京')+dc('神奈川','神奈川')+dc('千葉','千葉')+'</div>';
 function ds(k,lab){return '<span class="sp-chip sm'+(spDSortK===k?' on':'')+'" onclick="spSDt(\''+k+'\')">'+lab+(spDSortK===k?(spDSortD<0?' ▼':' ▲'):'')+'</span>';}
 var sortbar='<div class="sp-dpf"><span class="sp-lbl">並び替え</span>'+ds('s','駅順(沿線順)')+ds('c','間取り順')+ds('r','順位順')+ds('p','都県順')+'<span class="sp-hint">行クリックで gap分析</span></div>';
 var MORD={'シングル':0,'カップル':1,'ファミリー':2};
 var ord=(typeof SPORDER!=='undefined'&&SPORDER[o.l])?SPORDER[o.l]:null;
 function byStr(a,b){return String(a).localeCompare(String(b),'ja');}
 function stIdx(st){if(!ord)return 0;var k=ord.indexOf(st);return k<0?9999:k;}
 var arr=ents.slice().sort(function(a,b){var r;
   if(spDSortK==='s'){ if(ord){r=(stIdx(a.st)-stIdx(b.st))*spDSortD;if(r)return r;}else{r=byStr(a.st,b.st)*spDSortD;if(r)return r;} r=MORD[a.cat]-MORD[b.cat];if(r)return r;return a.rank-b.rank;}
   if(spDSortK==='c'){r=((MORD[a.cat]||0)-(MORD[b.cat]||0))*spDSortD;if(r)return r;if(ord){r=stIdx(a.st)-stIdx(b.st);if(r)return r;}else{r=byStr(a.st,b.st);if(r)return r;}return a.rank-b.rank;}
   if(spDSortK==='p'){r=byStr(a.pref,b.pref)*spDSortD;if(r)return r;return a.rank-b.rank;}
   return (a.rank-b.rank)*spDSortD;});
 function da(k){return spDSortK===k?(spDSortD<0?'▼':'▲'):'';}
 var t='<div class="sp-xscroll" onwheel="spWheel(event,this)"><table class="sp-t2"><thead><tr><th class="l" onclick="spSDt(\'s\')">駅'+da('s')+'</th><th class="l" onclick="spSDt(\'c\')">間取り'+da('c')+'</th><th class="l" onclick="spSDt(\'p\')">都県'+da('p')+'</th><th onclick="spSDt(\'r\')" style="text-align:right;cursor:pointer">順位'+da('r')+'</th><th class="l">担当</th><th class="l">優先</th><th class="l">opo帯(金額)</th><th class="l sp-demh">dema帯</th><th class="l">メモ</th></tr></thead><tbody>';
 arr.forEach(function(d){var pcl=d.cat==='シングル'?'pS':d.cat==='カップル'?'pC':'pF';var key=spKey(d);var kj=spJs(key);var em=EMEMO[key]||'';var ea=EASSIGN[key]||'';var ep=EPRI[key]||'';var band=spOpoBand(d)||'<span class="nd">—</span>';var dband=spDemBand(d)||'<span class="nd">—</span>';
   var tsel=spStaffSel(ea,'setEAx(\''+kj+'\',this.value)');
   var pri='<span class="sp-pri" onclick="event.stopPropagation()">'+['S','A','B'].map(function(L){return '<b class="p'+L+(ep===L?' on':'')+'" onclick="setEP(\''+kj+'\',\''+L+'\')">'+L+'</b>';}).join('')+'</span>';
   t+='<tr class="sp-drow" style="cursor:pointer" onclick="spOpenGap(\''+spJs(d.pref)+'\',\''+spJs(d.cat)+'\',\''+spJs(d.st)+'\')"><td class="l"'+(d.nc==='B'?' style="color:#0070C0"':d.nc==='G'?' style="color:#188038"':'')+'>'+d.st+'</td><td class="l"><span class="sp-pill '+pcl+'">'+d.cat+'</span></td><td class="l">'+spPB(d.pref)+'</td><td style="text-align:right">'+d.rank+'位</td><td class="l">'+tsel+'</td><td class="l">'+pri+'</td><td class="l sp-band">'+band+'</td><td class="l sp-dem">'+dband+'</td><td class="l" onclick="event.stopPropagation()"><input class="sp-memo'+(em?' on':'')+'" value="'+spEsc(em)+'" placeholder="メモ" onchange="setEM(\''+kj+'\',this.value)"></td></tr>';});
 t+='</tbody></table></div>';
 return '<div class="sp-expb">'+sum+chips+sortbar+t+'</div>';
}
